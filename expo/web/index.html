<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>WildRun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #050705;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
    }

    /* Subtle grid background on the outer shell */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(61,186,94,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,186,94,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* The phone-shaped container */
    #root {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      overflow: hidden;
      z-index: 1;
      box-shadow:
        0 0 0 1px rgba(61,186,94,0.15),
        0 0 60px rgba(61,186,94,0.05),
        -20px 0 80px rgba(0,0,0,0.6),
        20px 0 80px rgba(0,0,0,0.6);
    }

    /* On wider screens, show the side gutters more clearly */
    @media (min-width: 500px) {
      body {
        align-items: center;
      }
      #root {
        border-radius: 0;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
